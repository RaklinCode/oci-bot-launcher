name: OCI Ampere capacity hunter

on:
  schedule:
    # Every 5 min — GitHub's hard minimum. GH drops/delays scheduled runs on
    # free tier under load, so the effective rate will be lower (often more
    # like every 10–20 min), but this maximizes how often we poll OCI for
    # Ampere capacity. Pair with workflow_dispatch for manual nudges.
    - cron: '*/5 * * * *'
  workflow_dispatch:         # manual trigger button

concurrency:
  group: oci-launch
  cancel-in-progress: false

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install OCI CLI
        run: pip install --upgrade oci-cli

      - name: Configure OCI CLI
        env:
          OCI_USER:        ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY:     ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION:      ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "$OCI_PRIVATE_KEY" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=$OCI_USER
          fingerprint=$OCI_FINGERPRINT
          tenancy=$OCI_TENANCY
          region=$OCI_REGION
          key_file=$HOME/.oci/key.pem
          EOF
          chmod 600 ~/.oci/config

      - name: Skip if instance already exists
        id: check
        run: |
          existing=$(oci compute instance list \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_OCID }}" \
            --display-name "trading-bot" \
            --lifecycle-state RUNNING \
            --query 'data[0].id' --raw-output 2>/dev/null || echo "")
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            echo "Already running: $existing"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write SSH public key
        if: steps.check.outputs.skip == 'false'
        env:
          SSH_PUB: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          echo "$SSH_PUB" > /tmp/sshkey.pub

      - name: Launch Ampere A1 (4 OCPU / 24 GB)
        if: steps.check.outputs.skip == 'false'
        run: |
          set +e
          output=$(oci compute instance launch \
            --compartment-id "${{ secrets.OCI_COMPARTMENT_OCID }}" \
            --availability-domain "${{ secrets.OCI_AVAILABILITY_DOMAIN }}" \
            --shape VM.Standard.A1.Flex \
            --shape-config '{"ocpus":4,"memoryInGBs":24}' \
            --image-id "${{ secrets.OCI_IMAGE_OCID }}" \
            --subnet-id "${{ secrets.OCI_SUBNET_OCID }}" \
            --display-name "trading-bot" \
            --assign-public-ip true \
            --ssh-authorized-keys-file /tmp/sshkey.pub \
            --wait-for-state RUNNING 2>&1)
          rc=$?
          echo "$output"
          if [ $rc -eq 0 ]; then
            echo "::notice::Instance launched successfully."
            exit 0
          elif echo "$output" | grep -q "Out of host capacity"; then
            echo "::notice::Out of host capacity — will retry on next cron run."
            exit 0
          else
            echo "::error::Unexpected launch failure."
            exit 1
          fi
